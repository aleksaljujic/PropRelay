[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# the timezone is a symbol from https://babel.pocoo.org/en/latest/api/dates.html#babel.dates.get_timezone
timezone = UTC

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. If this key is omitted entirely, it falls back to the legacy
# behavior of splitting on spaces and/or commas.
version_path_separator = os

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# NOTE: The URL is overridden in alembic/env.py using pydantic-settings.
# This is a fallback for offline mode.
sqlalchemy.url = postgresql+asyncpg://propflow:propflow@localhost:5432/propflow


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts. See the documentation for further
# detail and examples


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
