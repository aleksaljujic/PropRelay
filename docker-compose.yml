version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://propflow:propflow@postgres:5432/propflow
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - propflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: propflow
      POSTGRES_USER: propflow
      POSTGRES_PASSWORD: propflow
    ports:
      - "5432:5432"
    volumes:
      - propflow-postgres-data:/var/lib/postgresql/data
    networks:
      - propflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propflow -d propflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - propflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  propflow-net:
    driver: bridge

volumes:
  propflow-postgres-data:
